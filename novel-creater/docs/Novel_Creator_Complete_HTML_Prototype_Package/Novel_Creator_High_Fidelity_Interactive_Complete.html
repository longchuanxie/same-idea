function mobile(){return `<div class="phone-stage"><div class="phone"><div class="phone-top"><button class="tiny-icon">${icon('i-menu')}</button><b>暮色之城</b><button class="tiny-icon">${icon('i-cloud')}</button></div><div class="phone-content">${mobileContent()}</div>${state.mobileTab==='ai'?mobileAgentSheet():''}<div class="phone-bottom"><div class="phone-nav ${state.mobileTab==='text'?'active':''}" data-mobile="text">正文</div><div class="phone-nav ${state.mobileTab==='outline'?'active':''}" data-mobile="outline">大纲</div><div class="phone-nav ${state.mobileTab==='data'?'active':''}" data-mobile="data">资料</div><div class="phone-nav ${state.mobileTab==='ai'?'active':''}" data-mobile="ai">AI</div></div></div></div>`}
function mobileContent(){if(state.mobileTab==='outline')return `<h3>第一卷　雾起</h3><div class="list-row"><b>第1章 雨夜的来客</b><span class="pill light">完成</span></div><div class="list-row"><b>第2章 旧档案</b><span class="pill warn">进行中</span></div><div class="list-row"><b>第3章 钥匙与门</b><span class="pill">草稿</span></div>`;if(state.mobileTab==='data')return `<h3>资料</h3><div class="card"><h4>林叙</h4><p>档案修复师，性格内敛。</p></div><div class="card" style="margin-top:10px"><h4>档案馆</h4><p>旧城区边缘，第三排区域被封锁。</p></div>`;return `<div style="display:flex;justify-content:space-between;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:10px"><span>第一卷　雾起 › 第2章</span><span>字数 2,341</span></div><div style="display:flex;gap:8px;margin:14px 0"><button class="btn">${icon('i-undo')}</button><button class="btn">${icon('i-redo')}</button><select class="select"><option>正文</option></select></div><article class="phone-doc"><h1>第2章　旧档案</h1><p>雨停了，城市却像被谁按下了静音键。空气里还残留着潮湿的铁锈味。</p><p>今天他 <span class="del">本不该来这里，</span><span class="ins">此刻却被一封匿名信引了进来。</span></p><div class="inline-tip">AI 建议：将“本不该来这里”改为更具画面感的表达</div></article>`}
function mobileAgentSheet(){return `<div class="phone-sheet"><div class="grip"></div><h3>Agent <span class="online">在线</span></h3><div class="agent-tabs"><span class="pill">脑暴</span><span class="pill">调研</span><span class="pill">骨架</span><span class="pill active">写作</span></div><div class="bubble user">根据当前章节内容，继续推进故事情节。</div><div class="bubble ai">好的，我将延续当前悬疑氛围，并把生成内容作为待确认修订。</div><button class="btn primary block" data-action="apply-revision">应用为修订</button></div>`}
function renderAgent(){
  const p=$('#agentPanel');
  const mode=state.agentMode;
  const messages=state.agentMessages[mode]||[];
  p.innerHTML=`<div class="agent-head"><h2>Agent <span class="online">• 在线</span></h2><button class="tiny-icon" data-action="toggle-agent">${icon('i-x')}</button></div><div class="agent-tabs">${[['brainstorm','脑暴'],['research','调研'],['outline','骨架'],['writing','写作'],['polish','润色'],['ask','问答']].map(([m,t])=>`<button class="pill ${m===mode?'active':''}" data-agent-mode="${m}">${t}</button>`).join('')}<button class="pill" data-action="more-agent">+</button></div><div class="agent-body">${messages.map(m=>`<div class="bubble ${m.role==='user'?'user':'ai'}">${m.role==='ai'?'<span class="avatar-ai">AI</span>':''}${escapeHtml(m.text)} <span class="time">${m.time}</span></div>`).join('')}${agentTools()}</div><div class="agent-input"><textarea id="agentInput" placeholder="向 Agent 提问（⌘/）"></textarea><button class="send-btn" data-action="send-agent">${icon('i-check')}</button></div>`;
}
function agentTools(){
  if(state.view==='research')return `<div class="mini-card"><h3>工具状态 <span>⌃</span></h3><div class="status-grid"><div class="status-cell"><span class="s-dot"></span>联网搜索<br>完成</div><div class="status-cell"><span class="s-dot"></span>学术检索<br>完成</div><div class="status-cell"><span class="s-dot"></span>网页解析<br>完成</div><div class="status-cell"><span class="s-dot"></span>内容提取<br>完成</div></div></div><div class="mini-card"><h3>调研计划</h3><div class="list-row"><span>确定时间范围与地区范围</span><span class="pill light">完成</span></div><div class="list-row"><span>分析推动因素</span><span class="pill warn">进行中</span></div><div class="list-row"><span>汇总成本与应用场景数据</span><span class="pill">待开始</span></div></div><button class="btn primary block" data-action="make-research-summary">生成调研摘要</button><div class="agent-actions"><button class="btn" data-action="save-note">保存为笔记</button><button class="btn" data-action="apply-reference">应用为参考</button></div>`;
  if(state.view==='outline')return `<div class="mini-card"><h3>情节建议</h3><p>当前节拍从“过渡”直接跳到“关键转折点”，建议补充角色行动或阻力，以增强因果逻辑。</p><button class="btn small" data-action="add-beat">插入建议节拍</button></div><div class="mini-card"><h3>缺失节拍提示</h3><p>检测到本章尚未设置“中点”，建议明确故事中点转折。</p><button class="btn small" data-action="add-midpoint">添加中点节拍</button></div><div class="mini-card"><h3>一致性提醒</h3><p>角色“苏晚”在第 3 章中主动接待林叙，建议补充动机或调查铺垫。</p><button class="btn small" data-action="locate-issue">查看位置</button></div>`;
  if(state.view==='revision')return `<div class="mini-card"><h3>修订建议原因</h3><p>当前修改可以增强氛围细节，同时减少解释性用语。</p><span class="pill">细节增强</span> <span class="pill">节奏优化</span></div><button class="btn primary block" data-action="accept-paragraph">应用当前建议</button>`;
  if(state.view==='settings')return `<div class="mini-card"><h3>模型状态</h3><p>当前：Claude 3.5 Sonnet<br>上下文：18,742 / 200K<br>输出：1,024</p></div><div class="mini-card"><h3>安全提示</h3><p>建议将 API Key 保存在本地加密存储中，Web 直连仅用于可信测试环境。</p></div>`;
  return `<div class="mini-card"><h3>工具状态 <span>⌃</span></h3><div class="status-grid"><div class="status-cell"><span class="s-dot"></span>长文本理解<br>完成</div><div class="status-cell"><span class="s-dot"></span>情节连贯性<br>良好</div><div class="status-cell"><span class="s-dot"></span>角色一致性<br>良好</div><div class="status-cell"><span class="s-dot warn"></span>悬念强度<br>较强</div></div></div><div class="mini-card"><h3>上下文摘要 <span>⌃</span></h3><p>当前章节：第 2 章　旧档案<br>视角：第三人称　限聚焦（林叙）<br>时间：雨夜之后<br>地点：城市档案馆<br>关键词：匿名信、钟楼、旧档案、钥匙</p></div><div class="mini-card"><h3>参考与来源（3）</h3><div class="source-row">${icon('i-doc')}<div>《城市档案馆管理条例（1931）》<br><small>PDF · 2.4 MB</small></div>${icon('i-link')}</div><div class="source-row">${icon('i-doc')}<div>钟楼与时间象征研究<br><small>网页 · school.example.edu</small></div>${icon('i-link')}</div><div class="source-row">${icon('i-image')}<div>民国时期城市建筑图录<br><small>图片 · 12 张</small></div>${icon('i-link')}</div></div><button class="btn primary block" data-action="generate-draft">生成草稿</button><div class="agent-actions"><button class="btn" data-action="save-note">保存为笔记</button><button class="btn" data-action="apply-revision">应用为修订</button></div>`;
}
function showModal(title, body){$('#modalTitle').textContent=title;$('#modalBody').innerHTML=body;$('#modalBackdrop').classList.add('show')}
function closeModal(){$('#modalBackdrop').classList.remove('show')}
function handleAction(action, el){
  const now=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  switch(action){
    case 'new-chapter':showModal('新建章节',`<label>章节标题</label><input class="input" style="width:100%;margin:8px 0 12px" value="第7章　迷雾尽头"><label>章节简介</label><textarea class="input" style="width:100%;height:96px;padding-top:10px">补充与旧档案相关的关键线索。</textarea><div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px"><button class="btn" data-action="close-modal">取消</button><button class="btn primary" data-action="create-chapter-confirm">创建章节</button></div>`);break;
    case 'create-chapter-confirm':closeModal();toast('已创建章节','新章节已加入第一卷末尾。');break;
    case 'accept-suggestion':state.inlineAccepted=true;state.inlineHidden=true;renderMain();toast('已接受内联建议','文本已应用为修订。');break;
    case 'ignore-suggestion':state.inlineHidden=true;renderMain();toast('已忽略建议');break;
    case 'continue-write':case 'rewrite':case 'expand':case 'shorten':case 'polish':state.agentMessages.writing.push({role:'user',text:{'continue-write':'续写当前段落','rewrite':'改写选中段落','expand':'扩写当前描写','shorten':'压缩当前段落','polish':'润色当前段落'}[action],time:now});state.agentMessages.writing.push({role:'ai',text:'已生成待确认建议，可在右侧面板点击“应用为修订”。',time:now});state.agentMode='writing';renderAgent();toast('Agent 已生成建议','请在右侧面板查看并确认写入。');break;
    case 'generate-draft':state.agentMessages.writing.push({role:'ai',text:'林叙把钥匙贴近锁孔，冰冷的金属像在回应他的心跳。抽屉深处传来一声轻响，仿佛有人在里面轻轻敲门。',time:now});renderAgent();toast('草稿已生成');break;
    case 'apply-revision':state.acceptedChanges++;toast('已加入待确认变更','不会直接覆盖正文，可在修订中心审核。');break;
    case 'research-search':state.researchDone=true;renderMain();toast('搜索完成','新增 6 条结果，并更新调研计划。');break;
    case 'add-reference':toast('已添加到调研笔记');break;
    case 'quote-source':toast('已复制引用标记','可插入章节或笔记。');break;
    case 'save-note':toast('已保存到笔记');break;
    case 'make-research-summary':state.agentMessages.research.push({role:'ai',text:'调研摘要：蒸汽供暖适合出现在档案馆、学校等公共建筑，民居中则应呈现阶层差异。',time:now});renderAgent();toast('调研摘要已生成');break;
    case 'accept-all':state.revisionAccepted=12;renderMain();toast('已接受全部修订');break;
    case 'reject-all':state.revisionAccepted=0;renderMain();toast('已拒绝全部修订');break;
    case 'next-rev':state.revisionIndex=Math.min(12,state.revisionIndex+1);renderMain();toast('已切换到下一条');break;
    case 'prev-rev':state.revisionIndex=Math.max(1,state.revisionIndex-1);renderMain();toast('已切换到上一条');break;
    case 'accept-paragraph':state.revisionAccepted=Math.min(12,state.revisionAccepted+1);renderMain();toast('已接受当前段落修订');break;
    case 'do-export':state.exportHistory.unshift(`暮色之城_第${state.chapter}章_${chapters[state.chapter]}.${state.format==='Project Package'?'ncpkg':state.format.toLowerCase().replace('markdown','md')}`);renderMain();toast('导出成功','文件已写入导出历史。');break;
    case 'clear-history':state.exportHistory=[];renderMain();toast('导出历史已清空');break;
    case 'test-api':toast('连接成功','服务商状态已更新为“已连接”。');break;
    case 'save-api':toast('API 配置已保存');break;
    case 'toggle-agent':state.rightOpen=!state.rightOpen;render();break;
    case 'send-agent':{const input=$('#agentInput');const text=input&&input.value.trim();if(!text){toast('请输入指令');break;}state.agentMessages[state.agentMode].push({role:'user',text,time:now});state.agentMessages[state.agentMode].push({role:'ai',text:'已收到，我会基于当前章节上下文给出可审核的建议。',time:now});renderAgent();toast('Agent 已回复');break;}
    case 'close-modal':closeModal();break;
    default:toast('已触发交互', action.replace(/-/g,' '));
  }
}
document.addEventListener('click',e=>{
  const view=e.target.closest('[data-view]');
  if(view){setView(view.dataset.view);return;}
  const chapter=e.target.closest('[data-chapter]');
  if(chapter){state.chapter=Number(chapter.dataset.chapter);state.view='editor';state.inlineHidden=false;render();return;}
  const mode=e.target.closest('[data-agent-mode]');
  if(mode){state.agentMode=mode.dataset.agentMode;renderAgent();return;}
  const format=e.target.closest('[data-format]');
  if(format){state.format=format.dataset.format;renderMain();toast('已切换导出格式',state.format);return;}
  const mobile=e.target.closest('[data-mobile]');
  if(mobile){state.mobileTab=mobile.dataset.mobile;renderMain();return;}
  const action=e.target.closest('[data-action]');
  if(action){handleAction(action.dataset.action, action);return;}
});
document.addEventListener('keydown',e=>{
  if(e.key==='Tab' && state.view==='editor' && !state.inlineAccepted && !state.inlineHidden){e.preventDefault();handleAction('accept-suggestion');}
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();toast('搜索已激活','可输入章节、角色、笔记或命令。')}
});
render();
</script>
</body>
</html>
