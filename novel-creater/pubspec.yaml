publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  drift: ^2.22.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.0
  path_provider: ^2.1.0
  sqlite3: ^2.3.0
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.4.13
  drift_dev: ^2.22.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  injectable_generator: ^2.6.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.0
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
