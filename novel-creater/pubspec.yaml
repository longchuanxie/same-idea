publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  characters: ^1.3.0
  drift: ^2.20.3
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.4
  get_it: ^7.7.0
  http: ^1.2.2
  json_annotation: ^4.9.0
  lucide_icons: ^0.257.0
  path: ^1.9.0
  path_provider: ^2.1.4
  sqlite3_flutter_libs: ^0.5.24

dev_dependencies:
  build_runner: ^2.4.13
  drift_dev: ^2.20.3
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  freezed: ^2.5.7
