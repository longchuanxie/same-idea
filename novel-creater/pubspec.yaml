publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  drift: ^2.22.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.0
  flutter_secure_storage: ^9.2.0
  freezed_annotation: ^2.4.4
  get_it: ^8.0.0
  injectable: ^2.5.0
  json_annotation: ^4.9.0
  logging: ^1.3.0
